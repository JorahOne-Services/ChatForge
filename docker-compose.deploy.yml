# ChatForge - Cloudflare Workers deployment
# This is a Wrangler-based app, using nginx as a static serve for demo

services:
  app:
    image: nginx:alpine
    container_name: chatforge
    ports:
      - "8091:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
    networks:
      - shared-infrastructure_default
    restart: unless-stopped

networks:
  shared-infrastructure_default:
    external: true
